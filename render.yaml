# Render 部署設定
# 文件：https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stock-observer
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
    healthCheckPath: /api/health
