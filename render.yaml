# Render 部署設定
# 文件：https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stock-observer
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MPLBACKEND
        value: Agg
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: COMPARE_MAX_WORKERS
        value: "1"
      - key: FINMIND_TOKEN
        sync: false
    healthCheckPath: /api/health
