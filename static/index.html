<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071525">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>台股多維度全方位觀測儀</title>
  <link rel="stylesheet" href="app.css?v=20260617">
</head>
<body>
  <header class="topbar">
    <h1>台股多維度全方位觀測儀</h1>
    <p class="subtitle" id="app-subtitle">基本面 · 技術面 · 籌碼面 · 綜合評估</p>
  </header>

  <section class="mode-bar" aria-label="分析模式">
    <button type="button" class="mode-btn active" data-mode="single">單檔分析</button>
    <button type="button" class="mode-btn" data-mode="compare">股票比較</button>
  </section>

  <section class="search-bar" id="search-single">
    <label for="stock-input">請輸入股票名稱或代碼</label>
    <div class="search-row">
      <div class="search-wrap">
        <input id="stock-input" type="text" placeholder="例如：2330 或 台積電" autocomplete="off">
        <ul id="suggestions" class="suggestions hidden"></ul>
      </div>
      <button id="btn-analyze" type="button">開始全方位診斷</button>
      <button id="btn-report" type="button" class="secondary" disabled>匯出 PDF 報告</button>
    </div>
    <p id="status" class="status"></p>
  </section>

  <section id="cached-single" class="cached-single hidden" aria-label="單檔快捷查看">
    <div class="cached-single-inner">
      <div id="single-picks" class="single-picks" role="list"></div>
    </div>
  </section>

  <section class="search-bar compare-bar hidden" id="search-compare">
    <label for="compare-input">加入要比較的股票（至少 2 檔，最多 4 檔）</label>
    <div class="search-row">
      <div class="search-wrap">
        <input id="compare-input" type="text" placeholder="例如：2330 或 台積電" autocomplete="off">
        <ul id="compare-suggestions" class="suggestions hidden"></ul>
      </div>
      <button id="btn-add-compare" type="button">加入</button>
      <button id="btn-run-compare" type="button" disabled>開始比較</button>
    </div>
    <ul id="compare-chips" class="compare-chips" aria-label="已選股票"></ul>
    <p id="compare-status" class="status"></p>
  </section>

  <section id="compare-results" class="compare-results hidden" aria-label="股票比較結果"></section>

  <main id="results" class="results hidden">
    <nav class="tab-nav" id="tab-nav" aria-label="分析面向">
      <label class="tab-select-label" for="tab-select">分析面向</label>
      <select id="tab-select" class="tab-select">
        <option value="advice">綜合評估</option>
        <option value="profile">公司簡介</option>
        <option value="fundamental">基本面</option>
        <option value="technical">技術面</option>
        <option value="chips">籌碼面</option>
        <option value="news">消息面</option>
      </select>
      <div class="tabs" id="tabs">
        <button type="button" class="tab active" data-tab="advice">綜合評估</button>
        <button type="button" class="tab" data-tab="profile">公司簡介</button>
        <button type="button" class="tab" data-tab="fundamental">基本面</button>
        <button type="button" class="tab" data-tab="technical">技術面</button>
        <button type="button" class="tab" data-tab="chips">籌碼面</button>
        <button type="button" class="tab" data-tab="news">消息面</button>
      </div>
    </nav>

    <div class="panels">
      <section id="panel-advice" class="panel active"></section>
      <section id="panel-profile" class="panel"></section>
      <section id="panel-fundamental" class="panel"></section>
      <section id="panel-technical" class="panel"></section>
      <section id="panel-chips" class="panel"></section>
      <section id="panel-news" class="panel"></section>
    </div>
  </main>

  <footer class="footer">
    <p>資料來源：FinMind + Yahoo Finance，不構成投資建議</p>
  </footer>

  <script src="config.js?v=20260617"></script>
  <script src="chart.js?v=20260617"></script>
  <script src="app.js?v=20260617"></script>
</body>
</html>
